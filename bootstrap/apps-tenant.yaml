apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-tenant-apps
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/Mateus-Sebastiao/homeops_gitops-server
    targetRevision: main
    path: registry/tenant/local-ai-assistant
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
