apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: local-ai-assistant-project
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: Project for local-ai-assistant apps
  sourceRepos:
  - 'https://github.com/Mateus-Sebastiao/homeops_gitops-server'
  - 'https://github.com/Mateus-Sebastiao/local-ai-assistant'
  - 'https://github.com'
  destinations:
  - namespace: local-ai-assistant
    server: https://kubernetes.default.svc
